<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acquia Enablement — Request Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --ink:     #0f1117;
    --ink-2:   #3d4151;
    --ink-3:   #7c8299;
    --bg:      #f5f6fa;
    --surface: #ffffff;
    --border:  #e3e6ef;
    --blue:    #1B4DFF;
    --blue-d:  #1340d4;
    --blue-l:  #eef2ff;
    --green:   #12a057;
    --green-l: #f0faf5;
    --red:     #e5303a;
    --radius:  12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; }

  /* ── Shell ── */
  .shell { height: 100vh; display: grid; grid-template-rows: 56px 1fr auto; max-width: 720px; margin: 0 auto; }

  /* ── Header ── */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
  .header-brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 30px; height: 30px; background: var(--blue); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo svg { width: 16px; height: 16px; fill: white; }
  .brand-text { font-size: 14px; font-weight: 600; color: var(--ink); }
  .brand-text span { color: var(--blue); }
  .status-dot { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--ink-3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* ── Messages ── */
  .messages { overflow-y: auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }
  .msg-row { display: flex; gap: 10px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .avatar.bot { background: var(--blue-l); color: var(--blue); }
  .avatar.user { background: var(--bg); border: 1px solid var(--border); color: var(--ink-3); }
  .bubble { max-width: 82%; padding: 10px 14px; font-size: 14px; line-height: 1.6; }
  .msg-row.bot .bubble { background: var(--surface); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; color: var(--ink); }
  .msg-row.user .bubble { background: var(--blue); color: white; border-radius: 14px 4px 14px 14px; }
  .bubble-time { font-size: 11px; color: var(--ink-3); margin-top: 4px; padding: 0 4px; }
  .msg-row.user .bubble-time { text-align: right; }

  /* ── Typing indicator ── */
  .typing { display: none; align-items: center; gap: 10px; }
  .typing.visible { display: flex; }
  .typing-dots { display: flex; gap: 4px; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── Intake summary card ── */
  .summary-card { background: var(--green-l); border: 1px solid #9ae6b4; border-radius: var(--radius); padding: 14px 16px; margin-top: 6px; }
  .summary-title { font-size: 12px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .summary-row { display: flex; gap: 8px; font-size: 13px; color: var(--ink-2); margin-bottom: 4px; }
  .summary-label { color: var(--ink-3); min-width: 80px; font-size: 12px; }
  .summary-val { color: var(--ink); font-weight: 500; }
  .tag-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .tag { background: white; border: 1px solid #9ae6b4; color: var(--green); font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }

  /* ── Submit button in chat ── */
  .submit-bubble { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .btn-confirm { background: var(--blue); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background .15s; width: fit-content; }
  .btn-confirm:hover { background: var(--blue-d); }
  .btn-confirm:disabled { background: var(--ink-3); cursor: not-allowed; }
  .btn-edit { background: transparent; border: 1px solid var(--border); color: var(--ink-2); border-radius: 8px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-edit:hover { border-color: var(--ink-3); }

  /* ── Success ── */
  .success-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; text-align: center; margin-top: 6px; }
  .success-icon { font-size: 32px; margin-bottom: 10px; }
  .success-id { display: inline-block; background: var(--blue-l); color: var(--blue); border-radius: 6px; padding: 4px 14px; font-size: 14px; font-weight: 600; margin: 6px 0 10px; }
  .success-card p { font-size: 13px; color: var(--ink-2); line-height: 1.6; }

  /* ── Input area ── */
  .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 12px 16px; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-wrap { flex: 1; background: var(--bg); border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 14px; display: flex; align-items: flex-end; gap: 8px; transition: border-color .15s; }
  .input-wrap:focus-within { border-color: var(--blue); background: var(--surface); }
  #userInput { flex: 1; border: none; background: transparent; font-size: 14px; color: var(--ink); outline: none; font-family: inherit; resize: none; line-height: 1.5; max-height: 120px; min-height: 22px; overflow-y: auto; }
  #userInput::placeholder { color: var(--ink-3); }
  .btn-send { width: 36px; height: 36px; background: var(--blue); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .15s; }
  .btn-send:hover { background: var(--blue-d); }
  .btn-send:disabled { background: var(--border); cursor: not-allowed; }
  .btn-send svg { width: 16px; height: 16px; fill: white; }
  .input-hint { font-size: 11px; color: var(--ink-3); text-align: center; margin-top: 6px; }
</style>
</head>
<body>
<div class="shell">

  <header class="header">
    <div class="header-brand">
      <div class="logo"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg></div>
      <span class="brand-text">Acquia <span>Enablement</span></span>
    </div>
    <div class="status-dot"><div class="dot"></div>AI assistant active</div>
  </header>

  <div class="messages" id="messages">
    <!-- Messages injected here -->
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <textarea id="userInput" rows="1" placeholder="Describe what you need…" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>

</div>

<script>
// ── CONFIG ───────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzNW79uIZWynZtAosKV5rLu5fEafcxZiydX-nwrF-oERXjBHFJtQ_ZVwA0JTTZaH0E/exec";
const ANTHROPIC_API   = "https://api.anthropic.com/v1/messages";

// ── CONVERSATION STATE ────────────────────────────────────────
let history = [];
let pendingIntake = null;
let submitted = false;

// ── SYSTEM PROMPT ─────────────────────────────────────────────
const SYSTEM = `You are the Acquia Sales Enablement intake assistant. Your job is to collect enablement requests through natural conversation and extract the required fields.

REQUIRED FIELDS to collect:
- email: requestor's work email (ask if not provided)
- type: "Recorded" (on-demand video/module), "Live" (instructor-led session), or "Task" (asset/doc request)
- title: short descriptive title
- audience: who this is for (Sales Group, Presales, CSMs, AMs, AEs, BDRs, TAMs — can be multiple)
- urgency: "Yesterday", "Right now", "0-1 month", or "1 month+"
- summary: brief description of what is needed and why
- criteria: productivity criteria met — any of: Deal Value, Win Rate, Conversion Rate, Pipeline Generation
- focus: enablement focus area — any of: Product Knowledge, Sales Skills, Sales Process, Partner Selling
- newRef: "New" or "Refresher"
- people: individuals presenting or creating the content (for Recorded/Live)

CONVERSATION RULES:
1. Be warm, concise, and professional. Sound like a helpful colleague, not a form.
2. Extract as much as possible from the first message — never ask for something the person already told you.
3. Ask at most 2 follow-up questions per turn. Group them naturally.
4. Once you have enough information, output a JSON block wrapped in <INTAKE_READY> tags like this:

<INTAKE_READY>
{
  "email": "...",
  "type": "Live",
  "title": "...",
  "audience": "AEs, BDRs",
  "urgency": "0-1 month",
  "summary": "...",
  "criteria": "Win Rate, Deal Value",
  "focus": "Product Knowledge",
  "newRef": "New",
  "people": "..."
}
</INTAKE_READY>

5. Before the JSON block, write a brief conversational confirmation message showing what you captured.
6. For Task requests, people field can be empty.
7. If urgency is unclear, infer from context (e.g. "before end of March" = "0-1 month", "for Q3" = "1 month+", "ASAP" = "Right now").
8. If criteria/focus are not mentioned, make reasonable inferences based on the request type and audience.
9. Keep responses under 80 words unless showing the final summary.`;

// ── INIT ──────────────────────────────────────────────────────
window.onload = () => {
  addBotMessage("Hi! I'm your Acquia Enablement assistant. Tell me what you need — just describe it naturally and I'll take care of the rest.\n\nFor example: *\"We need a live training on competitive positioning for the AE team before Q3\"*");
};

// ── SEND MESSAGE ──────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("userInput");
  const text  = input.value.trim();
  if (!text || submitted) return;

  input.value = "";
  autoResize(input);
  addUserMessage(text);
  history.push({ role: "user", content: text });

  setLoading(true);

  try {
    const response = await fetch(ANTHROPIC_API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model:      "claude-sonnet-4-6",
        max_tokens: 1000,
        system:     SYSTEM,
        messages:   history
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "Sorry, something went wrong. Please try again.";

    history.push({ role: "assistant", content: reply });
    setLoading(false);

    // Check if intake is ready
    if (reply.includes("<INTAKE_READY>")) {
      const jsonMatch = reply.match(/<INTAKE_READY>([\s\S]*?)<\/INTAKE_READY>/);
      const cleanText = reply.replace(/<INTAKE_READY>[\s\S]*?<\/INTAKE_READY>/, "").trim();
      if (cleanText) addBotMessage(cleanText);
      if (jsonMatch) {
        try {
          pendingIntake = JSON.parse(jsonMatch[1].trim());
          showIntakeSummary(pendingIntake);
        } catch(_) { addBotMessage(reply); }
      }
    } else {
      addBotMessage(reply);
    }

  } catch (err) {
    setLoading(false);
    addBotMessage("I'm having trouble connecting right now. Please try again in a moment.");
  }
}

// ── SHOW INTAKE SUMMARY ───────────────────────────────────────
function showIntakeSummary(intake) {
  const now   = new Date();
  const pad   = n => String(n).padStart(2, "0");
  const id    = "SE-" + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate()) + "-" + String(Math.floor(Math.random()*900)+100);
  intake.id   = id;
  intake.source = "ai_chat";

  const card = document.createElement("div");
  card.className = "msg-row bot";
  card.innerHTML = `
    <div class="avatar bot">AI</div>
    <div style="max-width:82%">
      <div class="summary-card">
        <div class="summary-title">Ready to submit</div>
        <div class="summary-row"><span class="summary-label">Intake ID</span><span class="summary-val">${id}</span></div>
        <div class="summary-row"><span class="summary-label">Type</span><span class="summary-val">${intake.type || "—"}</span></div>
        <div class="summary-row"><span class="summary-label">Title</span><span class="summary-val">${intake.title || "—"}</span></div>
        <div class="summary-row"><span class="summary-label">For</span><span class="summary-val">${intake.audience || "—"}</span></div>
        <div class="summary-row"><span class="summary-label">Urgency</span><span class="summary-val">${intake.urgency || "—"}</span></div>
        <div class="summary-row"><span class="summary-label">Presenter</span><span class="summary-val">${intake.people || "—"}</span></div>
        <div class="tag-row">
          ${(intake.criteria||"").split(",").map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join("")}
          ${(intake.focus||"").split(",").map(t=>t.trim()).filter(Boolean).map(t=>`<span class="tag">${t}</span>`).join("")}
          ${intake.newRef ? `<span class="tag">${intake.newRef}</span>` : ""}
        </div>
      </div>
      <div class="submit-bubble">
        <button class="btn-confirm" onclick="submitIntake(this)" id="confirmBtn">Submit request</button>
        <button class="btn-edit" onclick="editIntake()">Something's wrong — let me fix it</button>
      </div>
    </div>`;
  document.getElementById("messages").appendChild(card);
  scrollToBottom();
}

// ── SUBMIT INTAKE ─────────────────────────────────────────────
async function submitIntake(btn) {
  if (!pendingIntake) return;
  btn.disabled = true;
  btn.textContent = "Submitting…";

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode:   "no-cors",
      body:   JSON.stringify(pendingIntake)
    });
  } catch(_) {}

  submitted = true;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("userInput").disabled = true;
  document.getElementById("userInput").placeholder = "Request submitted";

  const row = document.createElement("div");
  row.className = "msg-row bot";
  row.innerHTML = `
    <div class="avatar bot">AI</div>
    <div style="max-width:82%">
      <div class="success-card">
        <div class="success-icon">✓</div>
        <div class="success-id">${pendingIntake.id}</div>
        <p>Your request has been submitted. You will receive a confirmation email shortly and can track progress in <strong>#enablement-intake</strong> on Slack.</p>
      </div>
    </div>`;
  document.getElementById("messages").appendChild(row);
  scrollToBottom();
}

// ── EDIT INTAKE ───────────────────────────────────────────────
function editIntake() {
  pendingIntake = null;
  addBotMessage("No problem — what would you like to change? Just tell me and I'll update the request.");
  document.getElementById("userInput").focus();
}

// ── UI HELPERS ────────────────────────────────────────────────
function addBotMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row bot";
  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
  row.innerHTML = `
    <div class="avatar bot">AI</div>
    <div>
      <div class="bubble">${formatted}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  document.getElementById("messages").appendChild(row);
  scrollToBottom();
}

function addUserMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="avatar user">You</div>
    <div>
      <div class="bubble">${escHtml(text)}</div>
      <div class="bubble-time">${getTime()}</div>
    </div>`;
  document.getElementById("messages").appendChild(row);
  scrollToBottom();
}

function setLoading(on) {
  let typing = document.getElementById("typingIndicator");
  if (on) {
    if (!typing) {
      typing = document.createElement("div");
      typing.id = "typingIndicator";
      typing.className = "msg-row bot typing visible";
      typing.innerHTML = `<div class="avatar bot">AI</div><div class="typing-dots"><span></span><span></span><span></span></div>`;
      document.getElementById("messages").appendChild(typing);
    }
    typing.classList.add("visible");
    document.getElementById("sendBtn").disabled = true;
  } else {
    if (typing) typing.remove();
    document.getElementById("sendBtn").disabled = false;
  }
  scrollToBottom();
}

function scrollToBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function escHtml(t) {
  return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 120) + "px";
}
</script>
</body>
</html>
